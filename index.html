<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>The Braided River — A Graphic Novel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --text: #aaa;
    --text-bright: #ddd;
    --accent: #e8856c;
    --ui-bg: rgba(0,0,0,0.65);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── reader container ── */
  #reader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── page image ── */
  #page-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  #page-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
    user-select: none;
    -webkit-user-drag: none;
  }

  #page-img.loading { opacity: 0.3; }

  /* ── loading spinner ── */
  #spinner {
    position: absolute;
    display: none;
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── bottom bar ── */
  #bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--ui-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    gap: 12px;
    flex-shrink: 0;
  }

  #bar button {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-bright);
    font-size: 15px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #bar button:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); }
  #bar button:disabled { opacity: 0.25; cursor: default; }

  #info {
    text-align: center;
    flex: 1;
    min-width: 0;
  }
  #page-chapter {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }
  #page-title {
    font-size: 13px;
    color: var(--text-bright);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #page-counter {
    font-size: 11px;
    color: var(--text);
    margin-top: 2px;
  }

  /* ── progress bar ── */
  #progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  /* ── table of contents overlay ── */
  #toc-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 100;
    display: none;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0;
  }
  #toc-overlay.visible { display: block; }

  #toc-inner {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  #toc-inner h2 {
    font-size: 22px;
    color: var(--text-bright);
    margin-bottom: 24px;
    font-weight: 700;
  }

  .toc-part {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 24px;
    margin-bottom: 8px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .toc-part:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }

  .toc-chapter {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    margin-top: 14px;
    margin-bottom: 4px;
    padding: 4px 12px;
    opacity: 0.8;
  }

  .toc-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .toc-item:hover { background: rgba(255,255,255,0.06); }
  .toc-item.current { background: rgba(232,133,108,0.12); }

  .toc-thumb {
    width: 72px;
    height: 50px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: #222;
  }

  .toc-label {
    font-size: 14px;
    color: var(--text-bright);
  }
  .toc-label small {
    display: block;
    font-size: 11px;
    color: var(--text);
    margin-top: 2px;
  }

  .toc-done { opacity: 1; }
  .toc-upcoming { opacity: 0.35; }
  .toc-upcoming .toc-thumb { display: none; }

  #toc-close {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 101;
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text-bright);
    font-size: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #toc-overlay.visible ~ #toc-close { display: flex; }

  /* ── tap zones (invisible) ── */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%;
    z-index: 2;
  }
  .tap-left { left: 0; cursor: w-resize; }
  .tap-right { right: 0; cursor: e-resize; }
</style>
</head>
<body>

<div id="reader">
  <div id="page-container">
    <img id="page-img" src="" alt="Page">
    <div id="spinner"></div>
    <div class="tap-zone tap-left" id="tap-left"></div>
    <div class="tap-zone tap-right" id="tap-right"></div>
  </div>
  <div id="bar">
    <button id="btn-prev" aria-label="Previous page">&#8592;</button>
    <button id="btn-toc" aria-label="Table of contents" style="font-size:12px;">&#9776;</button>
    <div id="info">
      <div id="page-chapter"></div>
      <div id="page-title"></div>
      <div id="page-counter"></div>
    </div>
    <button id="btn-next" aria-label="Next page">&#8594;</button>
  </div>
  <div id="progress"></div>
</div>

<div id="toc-overlay"></div>
<button id="toc-close" aria-label="Close table of contents">&times;</button>

<script>
let PAGES = [];
let UPCOMING_CHAPTERS = [];
let current = 0;

const img = document.getElementById('page-img');
const spinner = document.getElementById('spinner');
const chapterEl = document.getElementById('page-chapter');
const titleEl = document.getElementById('page-title');
const counter = document.getElementById('page-counter');
const progress = document.getElementById('progress');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnToc = document.getElementById('btn-toc');
const tocOverlay = document.getElementById('toc-overlay');
const tocCloseBtn = document.getElementById('toc-close');

function show(idx) {
  if (idx < 0 || idx >= PAGES.length) return;
  current = idx;
  const page = PAGES[current];

  img.classList.add('loading');
  spinner.classList.add('visible');

  const loader = new Image();
  loader.onload = () => {
    img.src = loader.src;
    img.classList.remove('loading');
    spinner.classList.remove('visible');
  };
  loader.src = page.file;

  chapterEl.textContent = page.chapter || '';
  chapterEl.style.display = page.chapter ? 'block' : 'none';
  titleEl.textContent = page.title;
  counter.textContent = `${current + 1} / ${PAGES.length}`;
  progress.style.width = `${((current + 1) / PAGES.length) * 100}%`;

  btnPrev.disabled = current === 0;
  btnNext.disabled = current === PAGES.length - 1;

  if (current + 1 < PAGES.length) new Image().src = PAGES[current + 1].file;
  if (current - 1 >= 0) new Image().src = PAGES[current - 1].file;

  localStorage.setItem('reich-gn-page', current);
}

function prev() { show(current - 1); }
function next() { show(current + 1); }

btnPrev.addEventListener('click', prev);
btnNext.addEventListener('click', next);
document.getElementById('tap-left').addEventListener('click', prev);
document.getElementById('tap-right').addEventListener('click', next);

document.addEventListener('keydown', (e) => {
  if (tocOverlay.classList.contains('visible')) {
    if (e.key === 'Escape') closeToc();
    return;
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { prev(); e.preventDefault(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { next(); e.preventDefault(); }
});

let touchStartX = 0;
let touchStartY = 0;
const pageContainer = document.getElementById('page-container');

pageContainer.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

pageContainer.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) next(); else prev();
  }
}, { passive: true });

function buildToc() {
  let html = '<div id="toc-inner"><h2>Table of Contents</h2>';
  let lastPart = null;
  let lastChapter = null;

  PAGES.forEach((p, i) => {
    if (p.part && p.part !== lastPart) {
      html += `<div class="toc-part">${p.part}</div>`;
      lastPart = p.part;
      lastChapter = null;
    }
    if (p.chapter && p.chapter !== lastChapter) {
      html += `<div class="toc-chapter">${p.chapter}</div>`;
      lastChapter = p.chapter;
    }
    html += `<a class="toc-item toc-done ${i === current ? 'current' : ''}" data-idx="${i}">
      <img class="toc-thumb" src="${p.file}" alt="" loading="lazy">
      <div class="toc-label">${p.title}</div>
    </a>`;
  });

  UPCOMING_CHAPTERS.forEach(section => {
    if (section.part !== lastPart) {
      html += `<div class="toc-part">${section.part}</div>`;
      lastPart = section.part;
    }
    section.chapters.forEach(ch => {
      html += `<div class="toc-chapter toc-upcoming">${ch}</div>`;
      html += `<div class="toc-item toc-upcoming">
        <div class="toc-label"><small>Coming soon</small></div>
      </div>`;
    });
  });

  html += '</div>';
  tocOverlay.innerHTML = html;

  tocOverlay.querySelectorAll('.toc-item.toc-done').forEach(el => {
    el.addEventListener('click', () => {
      show(parseInt(el.dataset.idx));
      closeToc();
    });
  });
}

function openToc() { buildToc(); tocOverlay.classList.add('visible'); }
function closeToc() { tocOverlay.classList.remove('visible'); }

btnToc.addEventListener('click', openToc);
tocCloseBtn.addEventListener('click', closeToc);
tocOverlay.addEventListener('click', (e) => { if (e.target === tocOverlay) closeToc(); });

// load manifest and start
fetch('pages.json')
  .then(r => r.json())
  .then(data => {
    PAGES = data.pages;
    UPCOMING_CHAPTERS = data.upcoming || [];
    const saved = localStorage.getItem('reich-gn-page');
    const startIdx = saved ? Math.min(parseInt(saved), PAGES.length - 1) : 0;
    show(startIdx);
  });
</script>
</body>
</html>
